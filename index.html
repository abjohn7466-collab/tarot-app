<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小白占星｜塔羅占卜</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d9c8b4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小白陪伴">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * {
      box-sizing: border-box;
    }
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js")
        .then(() => console.log("Service Worker 已註冊"))
        .catch((error) => console.log("Service Worker 註冊失敗:", error));

    body {
  margin: 0;
  font-family: "Noto Sans TC", sans-serif;

  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a 70%);
  color: #f5f5f5;

  min-height: 100vh;
  }
    body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;

  background-image: 
    radial-gradient(2px 2px at 20% 30%, #ffffff33, transparent),
    radial-gradient(2px 2px at 70% 60%, #ffffff22, transparent),
    radial-gradient(1px 1px at 40% 80%, #ffffff55, transparent);

  z-index: -1;
}

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 2px;
      color: #fff4d6;
    }

    .subtitle {
      color: #d2caea;
      margin-bottom: 28px;
      line-height: 1.8;
      font-size: 15px;
    }

    .panel {
      max-width: 560px;
      margin: 0 auto 28px;
      padding: 22px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    textarea, select, button {
      width: 100%;
      border-radius: 14px;
      border: none;
      padding: 13px 14px;
      font-size: 15px;
      margin-top: 12px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      background: rgba(255,255,255,0.94);
      color: #241d38;
    }

    select {
      background: rgba(255,255,255,0.94);
      color: #241d38;
    }

    button {
      background: linear-gradient(135deg, #f4d06f, #ffb347);
      color: #241d38;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 14px;
      color: #d5cdeb;
      min-height: 24px;
      line-height: 1.7;
      font-size: 14px;
    }

    .question-box {
      max-width: 920px;
      margin: 0 auto 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #eee8ff;
      line-height: 1.8;
      display: none;
    }

    .cards-area {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 24px;
      justify-content: center;
    }

    .cards-area.one {
      grid-template-columns: repeat(1, minmax(240px, 260px));
    }

    .cards-area.three {
      grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
    }

    .card-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .position-label {
      margin-bottom: 10px;
      color: #f4d98c;
      font-size: 15px;
      letter-spacing: 1px;
    }

    .tarot-card {
      width: 240px;
      height: 400px;
      perspective: 1200px;
    }

    .tarot-inner {
      width: 100%;
      height: 100%;
      transition: transform 0.8s ease;
      transform-style: preserve-3d;
      position: relative;
    }

    .tarot-card.flip .tarot-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow: 0 14px 35px rgba(0,0,0,0.45);
    }

    .back {
      background:
        radial-gradient(circle at center, rgba(255,215,120,0.12) 0%, transparent 28%),
        linear-gradient(135deg, #1f153f, #0d081f);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .back-design {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      border: 2px solid rgba(255,215,120,0.75);
      position: relative;
      background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .back-design::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(255,215,120,0.45);
      border-radius: 10px;
    }

    .back-design::after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border: 1px solid rgba(255,215,120,0.28);
      transform: rotate(45deg);
    }

    .back-center {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #f5d57a;
    }

    .back-sun {
      font-size: 38px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .back-stars {
      font-size: 13px;
      letter-spacing: 6px;
      margin-bottom: 10px;
    }

    .back-name {
      font-size: 12px;
      letter-spacing: 4px;
      color: #fff0b8;
    }

    .front {
      transform: rotateY(180deg);
      background: #ffffff;
      color: #111;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .front img {
      width: 100%;
      height: 285px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #241d38;
    }

    .card-orientation {
      font-size: 15px;
      color: #7a5b28;
    }

    .result-panel {
      max-width: 920px;
      margin: 30px auto 0;
      padding: 22px;
      border-radius: 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: left;
      box-shadow: 0 16px 40px rgba(0,0,0,0.28);
      display: none;
    }

    .result-panel h2 {
      margin-top: 0;
      color: #ffe29e;
      font-size: 24px;
    }

    .result-panel h3 {
      color: #f4d98c;
      margin-top: 24px;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .result-panel p {
      line-height: 1.95;
      color: #f2ecff;
      margin: 0 0 14px;
    }

    .footer-note {
      margin-top: 16px;
      color: #d0c7e8;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 28px;
      }

      .tarot-card {
        width: 210px;
        height: 360px;
      }

      .front img {
        height: 245px;
      }
    }
  </style>
</head>
<body>

  <h1>🔮 小白占星</h1>
  <div class="subtitle">
    抽牌之前，先把心安靜一下。<br>
    有些答案不是立刻出現，而是在翻牌的那一刻，被你自己看見。
  </div>

  <div class="panel">
    <textarea id="question" placeholder="輸入你的問題，例如：這段感情還有機會嗎？"></textarea>

    <select id="theme">
      <option value="general">一般指引</option>
      <option value="love">愛情</option>
      <option value="work">工作</option>
    </select>

    <select id="spread">
      <option value="1">單張占卜</option>
      <option value="3">三張占卜（現況 / 建議 / 結果）</option>
    </select>

    <button id="drawBtn" onclick="prepareDraw()">開始抽牌</button>
    <button id="flipBtn" onclick="flipCards()" disabled>翻牌</button>

    <div class="status" id="status">先輸入問題，再開始抽牌。</div>
  </div>

  <div class="question-box" id="questionBox"></div>

  <div id="cardsArea" class="cards-area one"></div>

  <div class="result-panel" id="resultPanel">

        "太陽": { upright: "工作結果有機會很亮眼。", reversed: "其實有進展，只是還沒完全顯現。" },
        "審判": { upright: "你到了該做職涯決定的時刻。", reversed: "你在逃避那個應該要面對的選擇。" },
        "世界": { upright: "工作階段有機會完成，進入下一個層次。", reversed: "事情快完成了，但還差最後整理。" }
      }
    };

    let currentDraw = [];
    let currentSpread = 1;
    let currentTheme = "general";
    let hasFlipped = false;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getUniqueDraw(count) {
      const shuffled = shuffle(cards);
      return shuffled.slice(0, count).map(card => {
        const orientation = Math.random() < 0.5 ? "正位" : "逆位";
        const meaning = meanings[currentTheme][card][orientation === "正位" ? "upright" : "reversed"];
        return { card, orientation, meaning };
      });
    }

    function prepareDraw() {
      const question = document.getElementById("question").value.trim();
      const questionBox = document.getElementById("questionBox");
      const cardsArea = document.getElementById("cardsArea");
      const resultPanel = document.getElementById("resultPanel");
      const status = document.getElementById("status");
      const flipBtn = document.getElementById("flipBtn");

      currentTheme = document.getElementById("theme").value;
      currentSpread = parseInt(document.getElementById("spread").value, 10);
      currentDraw = getUniqueDraw(currentSpread);
      hasFlipped = false;

      cardsArea.innerHTML = "";
      resultPanel.style.display = "none";
      cardsArea.className = currentSpread === 1 ? "cards-area one" : "cards-area three";

      if (question) {
        questionBox.style.display = "block";
        questionBox.innerHTML = `你的問題：${question}`;
      } else {
        questionBox.style.display = "block";
        questionBox.innerHTML = "你這次沒有輸入問題，也可以把它當成一個當下能量提醒。";
      }

      const positions = currentSpread === 3
        ? ["現況", "建議", "結果"]
        : ["你的牌"];

      currentDraw.forEach((item, index) => {
        const slot = document.createElement("div");
        slot.className = "card-slot";
        slot.innerHTML = `
          <div class="position-label">${positions[index]}</div>
          <div class="tarot-card" id="card-${index}">
            <div class="tarot-inner">
              <div class="face back">
                <div class="back-design">
                  <div class="back-center">
                    <div class="back-sun">☀</div>
                    <div class="back-stars">✦ ✧ ✦</div>
                    <div class="back-name">TAROT</div>
                  </div>
                </div>
              </div>
              <div class="face front">
                <img src="${tarotImages[item.card]}" alt="${item.card}">
                <div class="card-title">${item.card}</div>
                <div class="card-orientation">${item.orientation}</div>
              </div>
            </div>
          </div>
        `;
        cardsArea.appendChild(slot);
      });

      flipBtn.disabled = false;
      status.innerHTML = currentSpread === 1
        ? "牌已經抽好了，按下翻牌查看結果。"
        : "三張牌已經抽好，按下翻牌，它會一張一張打開。";
    }

    function flipCards() {
      if (!currentDraw.length || hasFlipped) return;

      const status = document.getElementById("status");
      const resultPanel = document.getElementById("resultPanel");
      const detailResult = document.getElementById("detailResult");

      currentDraw.forEach((_, index) => {
        setTimeout(() => {
          const cardEl = document.getElementById(`card-${index}`);
          if (cardEl) {
            cardEl.classList.add("flip");
          }
        }, index * 280);
      });

      hasFlipped = true;
      status.innerHTML = "牌面已展開，請慢慢感受它想對你說的話。";

      setTimeout(() => {
        detailResult.innerHTML = buildReading();
        resultPanel.style.display = "block";
        resultPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      }, currentDraw.length * 280 + 700);
    }

    function themeLabel() {
      if (currentTheme === "love") return "愛情";
      if (currentTheme === "work") return "工作";
      return "一般";
    }

    function buildReading() {
      const question = document.getElementById("question").value.trim();

      if (currentSpread === 1) {
        const item = currentDraw[0];
        return `
          <h3>${themeLabel()}主題｜${item.card}（${item.orientation}）</h3>
          <p>${item.meaning}</p>
          <p>${
            question
              ? `如果回到你剛剛問的「${question}」，這張牌比較像是在提醒你：不要只看表面，而是要看清自己現在真正站在哪裡。`
              : "這張牌比較像是一個當下提醒：你現在需要更誠實地看見自己的內在狀態。"
          }</p>
        `;
      }

      const [present, advice, result] = currentDraw;

      return `
        <h3>現況｜${present.card}（${present.orientation}）</h3>
        <p>${present.meaning}</p>

        <h3>建議｜${advice.card}（${advice.orientation}）</h3>
        <p>${advice.meaning}</p>

        <h3>結果｜${result.card}（${result.orientation}）</h3>
        <p>${result.meaning}</p>

        <h3>整體來看</h3>
        <p>
          你這次選的是${themeLabel()}主題，所以這組牌不是在抽象地談人生，
          而是比較直接地回到你目前最在意的領域。
        </p>
        <p>
          現況這張牌在說明你眼前真正的狀態；
          建議這張牌指出你接下來比較適合採取的態度；
          至於結果這張牌，則是在告訴你，如果你照這樣走下去，事情大致會往哪個方向發展。
        </p>
        <p>
          ${present.card} 讓你看到現在的核心問題，
          ${advice.card} 是這組牌最值得你聽進去的地方，
          而 ${result.card} 並不是死答案，而是一個趨勢提醒。
        </p>
        ${
          question
            ? `<p>如果回到你一開始問的「${question}」，這組牌比較像在告訴你：答案不是單純的是或不是，而是你必須先看清自己現在的狀態，才知道下一步怎麼走最適合。</p>`
            : ""
        }
      `;
    }
  </script>
</body>
</html>

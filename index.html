<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>小白占星｜塔羅抽牌</title>
  <style>
    body {
      font-family: Arial;
      background: #1e1b2e;
      color: white;
      text-align: center;
      padding: 30px;
    }
    textarea, select, button {
      padding: 10px;
      margin: 10px;
      width: 300px;
      border-radius: 10px;
      border: none;
    }
    button {
      background: gold;
      cursor: pointer;
    }
    .card {
      margin: 20px;
      padding: 20px;
      background: #2f2a4a;
      border-radius: 15px;
    }
  </style>
</head>
<body>

<h1>🔮 小白占星塔羅</h1>

<textarea id="question" placeholder="輸入你的問題"></textarea><br>

<select id="type">
  <option value="1">抽一張牌</option>
  <option value="3">三張牌</option>
</select><br>

<button onclick="draw()">開始抽牌</button>

<div id="result"></div>

<script>
const cards = [
"愚者","魔術師","女祭司","皇后","皇帝","教皇","戀人","戰車",
"力量","隱者","命運之輪","正義","吊人","死神","節制","惡魔",
"高塔","星星","月亮","太陽","審判","世界"
];

const meanings = {
"愚者":"新的開始，勇敢前進",
"魔術師":"你有能力創造結果",
"女祭司":"相信你的直覺",
"皇后":"事情正在成長",
"皇帝":"建立穩定與秩序",
"教皇":"遵循傳統或學習",
"戀人":"做出重要選擇",
"戰車":"全力衝刺會成功",
"力量":"溫柔但堅定",
"隱者":"需要思考與沉澱",
"命運之輪":"轉機出現",
"正義":"公平與因果",
"吊人":"暫停與等待",
"死神":"結束也是開始",
"節制":"保持平衡",
"惡魔":"被束縛",
"高塔":"突發變化",
"星星":"希望與療癒",
"月亮":"不安與迷惘",
"太陽":"成功與喜悅",
"審判":"重大決定",
"世界":"完成與圓滿"
};

function draw() {
  const type = document.getElementById("type").value;
  const result = document.getElementById("result");
  result.innerHTML = "";

  for (let i = 0; i < type; i++) {
    const card = cards[Math.floor(Math.random()*cards.length)];
    const reverse = Math.random() < 0.5 ? "正位" : "逆位";

    result.innerHTML += `
      <div class="card">
        <h2>${card}（${reverse}）</h2>
        <p>${meanings[card]}</p>
      </div>
    `;
  }
}
</script>

</body>
</html>

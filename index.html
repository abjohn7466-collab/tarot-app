<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>小白占星｜塔羅占卜</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #2a2250, #0f0c1a);
  color: white;
  text-align: center;
  padding: 40px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: gold;
  cursor: pointer;
}

/* 卡片 */
.tarot-card {
  width: 220px;
  height: 360px;
  perspective: 1000px;
  margin: 20px auto;
  cursor: pointer;
}

.tarot-inner {
  width: 100%;
  height: 100%;
  transition: transform 0.8s;
  transform-style: preserve-3d;
  position: relative;
}

.tarot-card.flip .tarot-inner {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  backface-visibility: hidden;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* 卡背 */
.back {
  background: linear-gradient(135deg, #2c1f5a, #120c2e);
  display: flex;
  align-items: center;
  justify-content: center;
  color: gold;
  font-size: 20px;
}

/* 正面 */
.front {
  transform: rotateY(180deg);
  background: white;
  color: black;
  padding: 10px;
}

.front img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔮 小白占星</h1>

<button onclick="draw()">抽牌</button>

<div id="result"></div>

<script>

// ===== 卡牌 =====
const cards = [
"愚者","魔術師","女祭司","皇后","皇帝","教皇","戀人","戰車",
"力量","隱者","命運之輪","正義","吊人","死神","節制","惡魔",
"高塔","星星","月亮","太陽","審判","世界"
];

// ===== 圖片 =====
const tarotImages = {
"愚者":"https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg",
"魔術師":"https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg",
"女祭司":"https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg",
"皇后":"https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg",
"皇帝":"https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg",
"教皇":"https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg",
"戀人":"https://upload.wikimedia.org/wikipedia/commons/3/3a/TheLovers.jpg",
"戰車":"https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg",
"力量":"https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg",
"隱者":"https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg",
"命運之輪":"https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg",
"正義":"https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg",
"吊人":"https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg",
"死神":"https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg",
"節制":"https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg",
"惡魔":"https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg",
"高塔":"https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg",
"星星":"https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg",
"月亮":"https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg",
"太陽":"https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg",
"審判":"https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg",
"世界":"https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg"
};

// ===== 抽牌 =====
function draw() {

  const result = document.getElementById("result");
  result.innerHTML = "";

  const card = cards[Math.floor(Math.random()*cards.length)];
  const reverse = Math.random() < 0.5 ? "正位" : "逆位";

  result.innerHTML = `
    <div class="tarot-card" onclick="this.classList.toggle('flip')">
      <div class="tarot-inner">

        <div class="face back">
          ✨ 小白占星 ✨
        </div>

        <div class="face front">
          <img src="${tarotImages[card]}">
          <h3>${card}（${reverse}）</h3>
        </div>

      </div>
    </div>
  `;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>小白占星｜塔羅占卜</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", Arial;
  background: radial-gradient(circle at top, #2a2250, #0f0c1a);
  color: white;
  text-align: center;
  padding: 40px 20px;
}

/* 標題 */
h1 {
  font-size: 32px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  margin-bottom: 30px;
}

/* 輸入區 */
textarea {
  width: 320px;
  height: 80px;
  border-radius: 12px;
  border: none;
  padding: 10px;
  font-size: 14px;
}

select, button {
  margin-top: 15px;
  padding: 12px;
  width: 200px;
  border-radius: 12px;
  border: none;
}

button {
  background: linear-gradient(135deg, gold, orange);
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* 卡片 */
.card {
  margin: 25px auto;
  padding: 20px;
  max-width: 320px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  margin: 10px 0;
}

.result-title {
  font-size: 18px;
  color: gold;
}

/* 小白解讀 */
.summary {
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.3);
}
</style>

</head>

<body>

<h1>🔮 小白占星｜塔羅抽牌</h1>
<div class="subtitle">抽一張牌，看看宇宙想告訴你什麼</div>

<textarea id="question" placeholder="輸入你的問題（例如：我該換工作嗎？）"></textarea><br>

<select id="type">
<option value="1">單張占卜</option>
<option value="3">三張占卜（過去 / 現在 / 未來）</option>
</select><br>

<button onclick="draw()">開始抽牌</button>

<div id="result"></div>

<script>

const cards = [
"愚者","魔術師","女祭司","皇后","皇帝","教皇","戀人","戰車",
"力量","隱者","命運之輪","正義","吊人","死神","節制","惡魔",
"高塔","星星","月亮","太陽","審判","世界"
];

const meanings = {
"愚者": { upright: "可以開始了", reversed: "太衝動" },
"魔術師": { upright: "你有能力", reversed: "方向錯了" },
"女祭司": { upright: "相信直覺", reversed: "你在逃避" },
"皇后": { upright: "慢慢變好", reversed: "忽略自己" },
"皇帝": { upright: "需要穩定", reversed: "控制過頭" },
"教皇": { upright: "照規則走", reversed: "想突破" },
"戀人": { upright: "重要選擇", reversed: "猶豫不決" },
"戰車": { upright: "可以前進", reversed: "失控" },
"力量": { upright: "內在很穩", reversed: "不自信" },
"隱者": { upright: "需要思考", reversed: "想太久" },
"命運之輪": { upright: "轉機來了", reversed: "時機未到" },
"正義": { upright: "公平結果", reversed: "失衡" },
"吊人": { upright: "暫停一下", reversed: "卡住太久" },
"死神": { upright: "結束重生", reversed: "放不下" },
"節制": { upright: "保持平衡", reversed: "失去節奏" },
"惡魔": { upright: "被困住", reversed: "開始清醒" },
"高塔": { upright: "突然變化", reversed: "早有問題" },
"星星": { upright: "有希望", reversed: "沒信心" },
"月亮": { upright: "不明確", reversed: "看清了" },
"太陽": { upright: "會成功", reversed: "差一步" },
"審判": { upright: "做決定", reversed: "逃避" },
"世界": { upright: "完成了", reversed: "未完成" }
};

function draw() {

  const type = document.getElementById("type").value;
  const result = document.getElementById("result");
  result.innerHTML = "";

  const positions = ["過去", "現在", "未來"];
  let summary = "";

  for (let i = 0; i < type; i++) {

    const card = cards[Math.floor(Math.random()*cards.length)];
    const reverse = Math.random() < 0.5 ? "正位" : "逆位";

    const meaning = meanings[card][reverse === "正位" ? "upright" : "reversed"];

    summary += meaning + "、";

    result.innerHTML += `
      <div class="card">
        <div class="result-title">${type == 3 ? positions[i] : "結果"}</div>
        <h3>${card}（${reverse}）</h3>
        <p>${meaning}</p>
      </div>
    `;
  }

  result.innerHTML += `
    <div class="card summary">
      <h3>✨ 小白解讀</h3>
      <p>${summary}</p>
      <p>👉 你現在的關鍵，不在外在，而在你怎麼面對自己的狀態。</p>
    </div>
  `;
}

</script>

</body>
</html>
